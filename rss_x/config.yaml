settings:
  timeout: 15
  max_entries: 30
  retry_times: 3
  retry_delay: 5
  db_path: "data/tweets.db"
  db_backup_enabled: true
  db_backup_retention: 7
  log_level: "INFO"
  log_path: "logs/rss_job.log"

  api_host: "0.0.0.0"
  api_port: 8080

  jwt_secret: "change-this-secret-in-production"
  jwt_expiry_hours: 24

  ai_provider: "openai"
  ai_model: "MiniMax-M2.7-highspeed"
  ai_api_key: ""
  ai_base_url: "https://api.minimaxi.com/v1"
  ai_extra_body:
    reasoning_split: true
  ai_max_tokens: 1000
  ai_temperature: 0.7

twitter:
  enabled: true
  rate_limit:
    base_delay: 2.5
    max_retries: 5
  default_count: 20
  request_timeout: 30

